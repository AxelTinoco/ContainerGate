name: 🐛 Bug report
description: Report a problem with ContainerGate
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behaviour?
      placeholder: |
        1. Open a link from '...'
        2. The modal shows '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: firefox-version
    attributes:
      label: Firefox version
      placeholder: e.g. 126.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: ContainerGate version
      description: Find it in about:addons or manifest.json
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: dropdown
    id: mac
    attributes:
      label: Is Firefox Multi-Account Containers installed?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: >
        Any errors from the Browser Console (Ctrl+Shift+J) or the background
        script console in about:debugging. This will be automatically formatted
        into code, so no need for backticks.
      render: shell
